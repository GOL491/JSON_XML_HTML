<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Météo Montréal + Actualités Radio-Canada</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0c0c0c 0%, #1a1a2e 50%, #16213e 100%);
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .header-ticker {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(10px);
        }

        .ticker-container {
            position: relative;
            overflow: hidden;
            white-space: nowrap;
            background: linear-gradient(90deg, #c00, #ff4444);
            height: 45px;
            display: flex;
            align-items: center;
            box-shadow: 0 2px 20px rgba(204, 0, 0, 0.4);
        }

        .ticker-label {
            background: rgba(0, 0, 0, 0.3);
            color: white;
            padding: 0 15px;
            font-weight: 700;
            font-size: 0.9rem;
            margin-right: 15px;
            flex-shrink: 0;
            border-right: 2px solid rgba(255, 255, 255, 0.2);
        }

        .ticker-wrapper {
            flex: 1;
            overflow: hidden;
        }

        .ticker-track {
            display: inline-flex;
            white-space: nowrap;
            animation: marquee 60s linear infinite;
        }

        .ticker-group {
            display: inline-flex;
        }

        .ticker-item {
            margin-right: 50px;
            white-space: nowrap;
            padding: 4px 0;
        }

        .ticker-item a {
            color: #fff;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .ticker-item a:hover {
            color: #00d4ff;
            text-shadow: 0 0 10px rgba(0, 212, 255, 0.5);
        }

        @keyframes marquee {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        .main-content {
            padding-top: 65px;
            min-height: calc(100vh - 65px);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .weather-card {
            background: rgba(51, 51, 51, 0.8);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 25px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 100%;
            max-width: 350px;
            transition: transform 0.3s ease;
        }

        .weather-card:hover {
            transform: translateY(-5px);
        }

        .city-name {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 10px;
            color: #fff;
        }

        .date-time {
            font-size: 1rem;
            color: #bbb;
            margin-bottom: 25px;
        }

        .temp {
            font-size: 5rem;
            font-weight: 800;
            color: #00d4ff;
            margin: 20px 0;
            text-shadow: 0 0 30px rgba(0, 212, 255, 0.5);
            font-family: 'Courier New', monospace;
        }

        .wind {
            font-size: 1.2rem;
            color: #88d4ff;
            margin-top: 10px;
        }

        .status {
            color: #ff6b6b;
            font-size: 0.85rem;
            margin-top: 15px;
            display: none;
        }

        .refresh-info {
            font-size: 0.75rem;
            color: #888;
            margin-top: 20px;
            opacity: 0.7;
        }

        @media (max-width: 480px) {
            .ticker-item { margin-right: 30px; }
            .ticker-item a { font-size: 0.75rem; }
            .temp { font-size: 4rem; }
            .weather-card { padding: 30px 20px; }
        }
    </style>
</head>
<body>

    <!-- Bannière Actualités -->
    <div class="header-ticker">
        <div class="ticker-container">
            <div class="ticker-label"> À LA UNE Radio-Canada</div>
            <div class="ticker-wrapper">
                <div id="tickerTrack" class="ticker-track">
                    <div id="tickerGroup1" class="ticker-group"></div>
                    <div id="tickerGroup2" class="ticker-group"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Contenu principal -->
    <div class="main-content">
        <div class="weather-card">
            <div class="city-name">Montréal, QC</div>
            <div id="date" class="date-time">Chargement...</div>
            <div id="temp" class="temp">--°C</div>
            <div id="wind" class="wind">Vent: -- km/h</div>
            <div id="status" class="status"></div>
            <div class="refresh-info">
                 Données Open-Meteo • Mise à jour automatique
            </div>
        </div>
    </div>

    <script>
        //  CHARGEMENT RSS Radio-Canada
        const RSS_URL = "https://ici.radio-canada.ca/info/rss/info/a-la-une";

        async function chargerFluxRSS() {
            try {
                const res = await fetch(RSS_URL);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);

                const text = await res.text();
                const parser = new DOMParser();
                const xml = parser.parseFromString(text, "text/xml");

                const items = xml.querySelectorAll("item");
                const group1 = document.getElementById("tickerGroup1");
                const group2 = document.getElementById("tickerGroup2");

                group1.innerHTML = "";
                group2.innerHTML = "";

                const maxItems = 12;
                let count = 0;

                Array.from(items).forEach(item => {
                    if (count >= maxItems) return;

                    const titleNode = item.querySelector("title");
                    const linkNode = item.querySelector("link");
                    if (!titleNode || !linkNode) return;

                    const title = titleNode.textContent.trim();
                    const link = linkNode.textContent.trim();

                    const span = document.createElement("span");
                    span.className = "ticker-item";

                    const a = document.createElement("a");
                    a.href = link;
                    a.target = "_blank";
                    a.rel = "noopener";
                    a.textContent = title;

                    span.appendChild(a);
                    group1.appendChild(span);
                    count++;
                });

                group2.innerHTML = group1.innerHTML;

            } catch (e) {
                console.error("RSS Error:", e);
            }
        }

        //  CHARGEMENT MÉTÉO Montréal
        async function chargerMeteo() {
            const url = "https://api.open-meteo.com/v1/forecast" +
                "?latitude=45.5019&longitude=-73.5674" +
                "&current=temperature_2m,wind_speed_10m" +
                "&timezone=America%2FToronto";

            try {
                const res = await fetch(url);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);

                const data = await res.json();
                const temp = Math.round(data.current.temperature_2m);
                const wind = Math.round(data.current.wind_speed_10m);

                document.getElementById('temp').textContent = temp + "°C";
                document.getElementById('wind').textContent = `Vent: ${wind} km/h`;
                document.getElementById('date').textContent = new Date().toLocaleString('fr-CA', {
                    weekday: 'short',
                    hour: '2-digit',
                    minute: '2-digit'
                });

            } catch (e) {
                const statusEl = document.getElementById('status');
                statusEl.style.display = 'block';
                statusEl.textContent = ' Problème de connexion météo';
                console.error("Weather Error:", e);
            }
        }

        //  INITIALISATION
        chargerFluxRSS();
        chargerMeteo();

        //  AUTO-RAFRAÎCHIR toutes les 5 minutes
        setInterval(() => {
            chargerFluxRSS();
            chargerMeteo();
        }, 5 * 60 * 1000);

        // Pause animation au hover (meilleure UX)
        document.querySelector('.ticker-container').addEventListener('mouseenter', () => {
            document.getElementById('tickerTrack').style.animationPlayState = 'paused';
        });
        document.querySelector('.ticker-container').addEventListener('mouseleave', () => {
            document.getElementById('tickerTrack').style.animationPlayState = 'running';
        });
    </script>
</body>
</html>
